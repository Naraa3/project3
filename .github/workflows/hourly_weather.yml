name: Hourly Weather ETL

on:
  schedule:
    - cron: "0 * * * *"   # every hour
  workflow_dispatch:      # lets you run it manually too

jobs:
  run-weather-etl:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install pandas sqlalchemy pg8000 requests psycopg2-binary dotenv

      - name: Run weather ETL
        run: |
          python etl/weather/load_weather_to_neon.py